    <circle cx="276" cy="200" r="18"/>
    <!-- Eye facet hatching -->
    <line x1="190" y1="192" x2="218" y2="208" stroke-width="0.5"/>
    <line x1="218" y1="192" x2="190" y2="208" stroke-width="0.5"/>
    <line x1="262" y1="192" x2="290" y2="208" stroke-width="0.5"/>
    <line x1="290" y1="192" x2="262" y2="208" stroke-width="0.5"/>
    <!-- Mandibles -->
    <path d="M226 276 L220 294 L238 284" stroke-width="0.8"/>
    <path d="M254 276 L260 294 L242 284" stroke-width="0.8"/>
    <!-- Price tag hanging to the right -->
    <path d="M344 356 L402 356 L416 376 L402 396 L344 396 Z" stroke-width="0.8"/>
    <circle cx="354" cy="376" r="3" stroke-width="0.6"/>
    <line x1="368" y1="370" x2="400" y2="370" stroke-width="0.5"/>
    <line x1="368" y1="382" x2="392" y2="382" stroke-width="0.5"/>
